<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:400,500&display=swap">
    <link rel="stylesheet" href="style.css">
   
    <title>Jeu d'Association</title>
    <style>

    </style>
</head>

<body>
    <!-- Título do jogo -->
    <div id="boxtitulo">
        <h1 id="titulo">Associez les images aux noms corrects</h1>
    </div>

    <!-- Mode Selection -->
<!-- Seleção de Modo -->
 <div id="boxjogoitem">
    <div id="boxMode">
        <label for="modeSelect" id="labelMode">Choisissez un mode:</label>
        <select id="modeSelect">
            <option value="vocabulary">Vocabulaire</option>
            <option value="game">Jeu</option>
            
        </select>
    </div>
    
    <!-- Seleção do número de itens por página -->
    <div id="boxItemsPerPage">
        <label for="itemsPerPageSelect" id="labelItemsPerPage">Articles par page:</label>
        <select id="itemsPerPageSelect">
            <option value="4">4</option>
            <option value="8" selected>8</option>
            <option value="12">12</option>
            <option value="16">16</option>
        </select>
    </div>
 </div>



    <!-- Seleção de categoria -->
    <div id="boxCategoria">
        <label for="categorySelect" id="labelCategoria">Choisissez une catégorie:</label>
        <select id="categorySelect">


            <!-- Alimentação e cozinha -->
            <optgroup label="Cuisine et Nourriture">
                <option value="nourriture">Nourriture</option>
                <option value="ustensiles_de_cuisine">Les ustensiles de la cuisine</option>
                <option value="verbes_cuisine">verbes utilisés dans la cuisine</option>

            </optgroup>

            <!-- Casa e móveis -->
            <optgroup label="La Maison">
                <option value="maisonLieux">La maison</option>
                <option value="exterieurMaison">L'exterieur de la maison</option>
                <option value="apartmentsLieux">Le apartment</option>
                <option value="maisonMeubles">Les meubles</option>
                <option value="nettoyage">Les accessoires de nettoyage</option>
            </optgroup>



            <!-- Corpo humano e saúde -->
            <optgroup label="Santé et Corps Humain">
                <option value="partiesDuCorps">Parties du corps</option>
                <option value="sentiments_et_emotions">Sentiments et émotions</option>
                <option value="problemes_de_sante">Problèmes de santé</option>
            </optgroup>

            <!-- Vestuário -->
            <optgroup label="Vêtements et Accessoires">
                <option value="vestuario_roupa_normal">Vêtements</option>
                <option value="vetements_de_saison">Vêtements de saison</option>
                <option value="vêtements_vestuario">Sous-vêtements</option>
                <option value="accessoires">Accessoires</option>
            </optgroup>

            <!-- Lugares e transportes -->
            <optgroup label="Lieux,Transports et Directions">
                <option value="lieux_de_la_ville">Lieux dans la ville</option>
                <option value="transports">Transports et circulation</option>
                <option value="plaques_transito">Panneaux de signalisation</option>
                <option value="rodovias_vias">Types de routes et voies express</option>
                <option value="directions">Donner des directions</option>

            </optgroup>

            <!-- Carro -->
            <optgroup label="Voiture">
                <option value="partes_de_la_voiture_externes">L’extérieur de la voiture</option>
                <option value="partes_internes_du_carro">L'intérieur de la voiture</option>
            </optgroup>

            <!-- Escritório e Natureza -->
            <optgroup label="Bureau et Nature">
                <option value="materiel_de_bureau">Matériel de bureau</option>
                <option value="nature">Nature</option>
            </optgroup>
        </select>
    </div>

    <!-- Botões de ação -->
    <div id="boxBotao">
        <button id="startGameBtn"> Commencer un nouveau jeu</button>
        <button id="finishGameBtn" disabled><a>Terminer et voir le vocabulaire</a></button>

        <button id="randomButton"><a>Changer de catégorie</a></button>

    </div>


    <!-- Feedback para o usuário -->
    <div id="boxfeedback">
        <p id="feedback"></p>
    </div>

    <!-- Área do jogo -->
    <div id="gameArea">
        <div id="professions"></div>
        <div id="items"></div>

    </div>
    <div id="boxgenerateItemsBtn">
        <button id="generateItemsBtn"><a>Accéder à la page suivante</a></button>
    </div>






    <div id="score" style="visibility: hidden;">Score: 0</div>
    <script src="script.js"></script>

</body>

</html>
